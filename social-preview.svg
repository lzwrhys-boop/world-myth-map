  <g font-family="Segoe UI, Arial, Helvetica, sans-serif">
    <text x="64" y="200" font-size="56" font-weight="600" fill="#e6e9ef" letter-spacing="0.04em">World Myth Map</text>
    <text x="64" y="252" font-size="26" font-weight="500" fill="#8eb4e0" letter-spacing="0.06em" opacity="0.95">Interactive 3D mythology atlas</text>
    <text x="64" y="310" font-size="19" font-weight="400" fill="#7a8498">
      <tspan x="64" dy="0">Explore myths, fairy tales, folk tales, and epics</tspan>
      <tspan x="64" dy="30">across world civilizations.</tspan>
    </text>
  </g>

  <g font-family="Segoe UI, Arial, Helvetica, sans-serif">
    <rect x="64" y="500" width="128" height="40" rx="8" fill="rgba(8, 12, 24, 0.85)" stroke="rgba(100, 115, 150, 0.25)" stroke-width="1"/>
    <text x="128" y="525" font-size="14" font-weight="500" fill="#aeb6c8" text-anchor="middle">249 Stories</text>
    <rect x="208" y="500" width="140" height="40" rx="8" fill="rgba(8, 12, 24, 0.85)" stroke="rgba(100, 115, 150, 0.25)" stroke-width="1"/>
    <text x="278" y="525" font-size="14" font-weight="500" fill="#aeb6c8" text-anchor="middle">75 Countries</text>
    <rect x="364" y="500" width="194" height="40" rx="8" fill="rgba(8, 12, 24, 0.85)" stroke="rgba(100, 115, 150, 0.25)" stroke-width="1"/>
    <text x="461" y="525" font-size="14" font-weight="500" fill="#aeb6c8" text-anchor="middle">3D Mythology Atlas</text>
