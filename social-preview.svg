<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="World Myth Map social preview">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020208"/>
      <stop offset="55%" stop-color="#010102"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="glowL" cx="18%" cy="22%" r="55%">
      <stop offset="0%" stop-color="#1e2a4a" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#0a0e18" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glowR" cx="88%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#2a1e40" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="globe" cx="38%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#1c3558"/>
      <stop offset="45%" stop-color="#0c1828"/>
      <stop offset="100%" stop-color="#04060c"/>
    </radialGradient>
    <radialGradient id="rim" cx="50%" cy="50%" r="50%">
      <stop offset="78%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#6a8cc0" stop-opacity="0.35"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowL)"/>
  <rect width="1200" height="630" fill="url(#glowR)"/>
  <ellipse cx="200" cy="480" rx="320" ry="200" fill="#0a0c16" opacity="0.5"/>

  <g fill="#d8e0f0" opacity="0.55">
    <circle cx="92" cy="64" r="1.1"/><circle cx="156" cy="118" r="0.7"/><circle cx="220" cy="48" r="0.8"/><circle cx="340" cy="90" r="0.5"/>
    <circle cx="420" cy="32" r="0.6"/><circle cx="510" cy="78" r="0.9"/><circle cx="44" cy="200" r="0.5"/><circle cx="128" cy="256" r="0.7"/>
    <circle cx="300" cy="200" r="0.4"/><circle cx="380" cy="150" r="0.5"/><circle cx="72" cy="400" r="0.5"/><circle cx="188" cy="360" r="0.6"/>
  </g>
  <g fill="#c9a66a" opacity="0.35">
    <circle cx="1080" cy="96" r="0.5"/><circle cx="1040" cy="200" r="0.4"/><circle cx="1160" cy="44" r="0.45"/>
  </g>

  <g>
    <circle cx="930" cy="300" r="198" fill="none" stroke="#5c6a82" stroke-opacity="0.18" stroke-width="1.5"/>
    <circle cx="930" cy="300" r="186" fill="url(#globe)"/>
    <circle cx="930" cy="300" r="186" fill="url(#rim)" opacity="0.85"/>
    <path d="M 780 260 Q 900 200 1000 280 T 1080 340" fill="none" stroke="#1a3050" stroke-width="2" stroke-opacity="0.35"/>
    <path d="M 800 360 Q 920 400 1020 320" fill="none" stroke="#0f2038" stroke-width="1.5" stroke-opacity="0.4"/>
  </g>

  <g>
    <circle cx="750" cy="200" r="5" fill="#4a6fa0" filter="url(#soft)" opacity="0.5"/>
    <circle cx="750" cy="200" r="2.2" fill="#a8c4e8"/>
    <circle cx="1010" cy="150" r="4" fill="#3a5080" filter="url(#soft)" opacity="0.45"/>
    <circle cx="1010" cy="150" r="1.8" fill="#c8d8f0"/>
    <circle cx="880" cy="150" r="3.5" fill="#2a4a78" filter="url(#soft)" opacity="0.5"/>
    <circle cx="880" cy="150" r="1.5" fill="#e6ecfc"/>
    <circle cx="1050" cy="300" r="4.2" fill="#355a88" filter="url(#soft)" opacity="0.48"/>
    <circle cx="1050" cy="300" r="1.7" fill="#9eb8e0"/>
    <circle cx="820" cy="360" r="3.2" fill="#2a3a5c" filter="url(#soft)" opacity="0.5"/>
    <circle cx="820" cy="360" r="1.4" fill="#f0f4ff"/>
    <circle cx="990" cy="400" r="3.6" fill="#3a4a70" filter="url(#soft)" opacity="0.45"/>
    <circle cx="990" cy="400" r="1.6" fill="#b8c8e8"/>
